<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visor 3D CTPI</title>
    <style>
        body { margin: 0; background-color: #f0f0f0; overflow: hidden; font-family: sans-serif; }
        canvas { display: block; }
        #loading {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            color: #333; font-weight: bold;
        }
        #info-box {
            position: absolute; bottom: 10px; left: 10px;
            background: rgba(0,0,0,0.7); color: white;
            padding: 8px; border-radius: 5px; font-size: 12px;
            display: none; pointer-events: none;
        }
    </style>
</head>
<body>
    <div id="loading">Cargando Mapa 3D...</div>
    <div id="info-box"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/OBJLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/MTLLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

    <script>
        let scene, camera, renderer, controls, raycaster, mouse;
        let markers = [];
        let model;

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0xf0f0f0);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(10, 10, 15);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.body.appendChild(renderer.domElement);

            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;

            raycaster = new THREE.Raycaster();
            mouse = new THREE.Vector2();

            const ambientLight = new THREE.AmbientLight(0xffffff, 0.8);
            scene.add(ambientLight);

            const directionalLight = new THREE.DirectionalLight(0xffffff, 0.5);
            directionalLight.position.set(5, 10, 7);
            scene.add(directionalLight);

            const mtlLoader = new THREE.MTLLoader();
            mtlLoader.setPath('src/');
            mtlLoader.load('material.mtl', function (materials) {
                materials.preload();
                
                const objLoader = new THREE.OBJLoader();
                objLoader.setMaterials(materials);
                objLoader.setPath('src/');
                objLoader.load('c4aa037ffcdb31b757a01673215d5713.obj', function (object) {
                    model = object;
                    scene.add(object);
                    document.getElementById('loading').style.display = 'none';
                    
                    // Centrar objeto
                    const box = new THREE.Box3().setFromObject(object);
                    const center = box.getCenter(new THREE.Vector3());
                    object.position.sub(center);
                    
                    // Ajustar cámara
                    const size = box.getSize(new THREE.Vector3());
                    const maxDim = Math.max(size.x, size.y, size.z);
                    camera.position.set(maxDim, maxDim, maxDim);
                    controls.update();

                    // Notificar a Android que el modelo está listo
                    if(window.Android) window.Android.onModelReady();
                });
            });

            window.addEventListener('click', onDocumentMouseDown, false);
            animate();
        }

        // Función para añadir puntos desde Java
        function addMarker(id, x, y, z, label) {
            const canvas = document.createElement('canvas');
            canvas.width = 128; canvas.height = 128;
            const ctx = canvas.getContext('2d');
            
            // Dibujar círculo rojo
            ctx.fillStyle = '#ff0000';
            ctx.beginPath();
            ctx.arc(64, 64, 30, 0, Math.PI * 2);
            ctx.fill();
            
            // Borde blanco
            ctx.strokeStyle = '#ffffff';
            ctx.lineWidth = 5;
            ctx.stroke();

            const texture = new THREE.CanvasTexture(canvas);
            const spriteMaterial = new THREE.SpriteMaterial({ map: texture, depthTest: false });
            const sprite = new THREE.Sprite(spriteMaterial);
            
            sprite.position.set(x, y, z);
            sprite.scale.set(1.5, 1.5, 1.5); // Tamaño del punto
            sprite.userData = { id: id, label: label };
            
            scene.add(sprite);
            markers.push(sprite);
        }

        function clearMarkers() {
            markers.forEach(m => scene.remove(m));
            markers = [];
        }

        function onDocumentMouseDown(event) {
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);

            // Verificar si tocamos un marcador
            const intersectsMarkers = raycaster.intersectObjects(markers);
            if (intersectsMarkers.length > 0) {
                const marker = intersectsMarkers[0].object;
                const info = document.getElementById('info-box');
                info.style.display = 'block';
                info.innerHTML = "<b>" + marker.userData.label + "</b><br>Toca para ver AR";
                
                // Notificar a Android el click en el programa
                if(window.Android) window.Android.onProgramClicked(marker.userData.label);
                return;
            }

            // Para ayudar a encontrar coordenadas (Debug)
            if (model) {
                const intersectsModel = raycaster.intersectObject(model, true);
                if (intersectsModel.length > 0) {
                    const p = intersectsModel[0].point;
                    console.log("Coords: x:" + p.x.toFixed(2) + " y:" + p.y.toFixed(2) + " z:" + p.z.toFixed(2));
                }
            }
        }

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', function () {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        init();
    </script>
</body>
</html>
