<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Avatar Viewer</title>
    <style>
        body { 
            margin: 0; 
            background-color: transparent; 
            overflow: hidden; 
            pointer-events: none; 
            user-select: none;
            -webkit-user-select: none;
        }
        model-viewer {
            width: 100%;
            height: 100vh;
            background-color: transparent;
            --poster-color: transparent;
        }
    </style>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
</head>
<body>
    <model-viewer 
        id="avatar"
        src="https://models.readyplayer.me/699da146f005c9608f5ee8aa.glb" 
        alt="Ready Player Me Avatar"
        camera-orbit="0deg 75deg 0.7m" 
        camera-target="0m 1.65m 0m"
        field-of-view="30deg"
        shadow-intensity="1"
        environment-image="neutral"
        exposure="1"
        interaction-prompt="none">
    </model-viewer>

    <script>
        function loadModel(url) {
            const modelViewer = document.querySelector('#avatar');
            modelViewer.src = url;
        }
    </script>
</body>
</html>
